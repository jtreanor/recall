name: Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        run: |
          xcodebuild test \
            -project Recall.xcodeproj \
            -scheme Recall \
            -destination 'platform=macOS'
